# Alembic config for the audit store.
# The DB URL is taken from the ALEMBIC_URL env var (falls back to this value),
# so secrets stay out of the repo. Use a SYNC driver here (psycopg2 / sqlite),
# not asyncpg — Alembic runs migrations synchronously.
[alembic]
script_location = alembic
prepend_sys_path = .
sqlalchemy.url = sqlite:///./alembic_local.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
